<div class="modal-overlay" (click)="closeModal()">
  <div class="modal-box" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2 class="modal-title">{{ product ? 'Editar producto' : 'Agregar producto' }}</h2>
      <button class="modal-close" (click)="closeModal()">✕</button>
    </div>
    
    <form [formGroup]="productForm" (ngSubmit)="onSubmit()" novalidate>
      <div class="form-row">
        <div class="form-group" style="grid-column:1/-1">
          <label>Nombre del producto</label>
          <input 
            type="text" 
            formControlName="name" 
            class="form-control" 
            placeholder="Ej. Proteína Whey 2kg" 
            [class.is-invalid]="f['name'].touched && f['name'].invalid" />
          @if (f['name'].touched && f['name'].errors?.['required']) { 
            <span class="field-error">El nombre es obligatorio</span> 
          }
        </div>

        <div class="form-group">
          <label>Código / Serial</label>
          <input 
            type="text" 
            formControlName="serialNumber" 
            class="form-control" 
            placeholder="PRO-001" 
            [class.is-invalid]="f['serialNumber'].touched && f['serialNumber'].invalid" />
          @if (f['serialNumber'].touched && f['serialNumber'].errors?.['required']) { 
            <span class="field-error">El código es obligatorio</span> 
          }
        </div>

        <div class="form-group">
          <label>Precio ($)</label>
          <input 
            type="number" 
            formControlName="price" 
            class="form-control" 
            placeholder="0.00" 
            min="0" />
        </div>

        @if (!product) {
          <div class="form-group">
            <label>Existencias iniciales (pzs)</label>
            <input 
              type="number" 
              formControlName="stock" 
              class="form-control" 
              placeholder="0" 
              min="0" />
          </div>
        }

        <div class="form-group" style="grid-column:1/-1">
          <label>Descripción (opcional)</label>
          <textarea 
            formControlName="description" 
            class="form-control" 
            placeholder="Descripción breve del producto"
            rows="3"></textarea>
        </div>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" (click)="closeModal()">Cancelar</button>
        <button type="submit" class="btn btn-success" [disabled]="isLoading">
          @if (isLoading) { 
            <span class="spinner-sm"></span> Guardando... 
          } @else { 
            {{ product ? 'Guardar cambios' : 'Agregar producto' }} 
          }
        </button>
      </div>
    </form>
  </div>
</div>
