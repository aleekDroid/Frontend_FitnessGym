<div class="modal-overlay" (click)="closeModal()">
  <div class="modal-box" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2 class="modal-title">{{ product ? 'Editar producto' : 'Agregar producto' }}</h2>
      <button class="modal-close" (click)="closeModal()">✕</button>
    </div>
    
    <form [formGroup]="productForm" (ngSubmit)="onSubmit()" novalidate>
      <div class="form-row">
        <div class="form-group" style="grid-column:1/-1">
          <label>Nombre del producto</label>
          <input 
            type="text" 
            formControlName="name" 
            class="form-control" 
            placeholder="Ej. Proteína Whey 2kg" 
            [class.is-invalid]="f['name'].touched && f['name'].invalid" />
          @if (f['name'].touched && f['name'].errors?.['required']) { 
            <span class="field-error">El nombre es obligatorio</span> 
          }
        </div>

<div class="input-with-action">
  <input 
    type="text" 
    formControlName="serialNumber" 
    class="form-control" 
    placeholder="PRO-001" 
    [class.is-invalid]="f['serialNumber'].touched && f['serialNumber'].invalid" />
    
  <button type="button" class="btn-action" (click)="showScanner = true" title="Escanear código">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M3 5v14M21 5v14M8 5v14M12 5v14M16 5v14"></path>
    </svg>
  </button>
</div>

        <div class="form-group">
          <label>Precio ($)</label>
          <div class="number-control" [class.is-invalid]="f['price'].touched && f['price'].invalid">
            <button type="button" class="btn-step" (click)="stepValue('price', -1)">−</button>
            <input 
              type="number" 
              formControlName="price" 
              class="form-control text-center no-spinners" 
              placeholder="0" 
              min="0" />
            <button type="button" class="btn-step" (click)="stepValue('price', 1)">+</button>
          </div>
        </div>

        @if (!product) {
          <div class="form-group" style="grid-column:1/-1">
            <label>Existencias iniciales (pzs)</label>
            <div class="number-control" [class.is-invalid]="f['stock'].touched && f['stock'].invalid">
              <button type="button" class="btn-step" (click)="stepValue('stock', -1)">−</button>
              <input 
                type="number" 
                formControlName="stock" 
                class="form-control text-center no-spinners" 
                placeholder="0" 
                min="0" />
              <button type="button" class="btn-step" (click)="stepValue('stock', 1)">+</button>
            </div>
          </div>
        }

        <div class="form-group" style="grid-column:1/-1">
          <label>Descripción (opcional)</label>
          <textarea 
            formControlName="description" 
            class="form-control" 
            placeholder="Descripción breve del producto"
            rows="3"></textarea>
        </div>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" (click)="closeModal()">Cancelar</button>
        <button type="submit" class="btn btn-primary" [disabled]="isLoading">
          @if (isLoading) { 
            <span class="spinner-sm"></span> Guardando... 
          } @else { 
            {{ product ? 'Guardar cambios' : 'Agregar producto' }} 
          }
        </button>
      </div>
    </form>
  </div>
</div>

@if (showScanner) {
  <app-qr-scanner-modal 
    (scanSuccess)="onCodeScanned($event)" 
    (closeScanner)="showScanner = false">
  </app-qr-scanner-modal>
}
