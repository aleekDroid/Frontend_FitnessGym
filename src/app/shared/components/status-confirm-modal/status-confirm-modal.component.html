<div class="modal-overlay" (click)="closeModal()">
  <div class="modal-box" (click)="$event.stopPropagation()">
    <div
      class="status-confirm"
      [class.status-confirm--deactivate]="isActive"
      [class.status-confirm--activate]="!isActive"
    >
      <!-- Header con icono y título -->
      <div class="status-header">
        <div class="status-icon">
          @if (isActive) {
            <!-- Desactivar: círculo tachado -->
            <svg
              width="30"
              height="30"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
            >
              <circle cx="12" cy="12" r="10"></circle>
              <line x1="4.93" y1="4.93" x2="19.07" y2="19.07"></line>
            </svg>
          } @else {
            <!-- Activar: check con círculo -->
            <svg
              width="30"
              height="30"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
              <polyline points="22 4 12 14.01 9 11.01"></polyline>
            </svg>
          }
        </div>

        <h3>{{ isActive ? "Desactivar" : "Activar" }} {{ entityType }}</h3>
      </div>

      <!-- Cuerpo -->
      <div class="status-body">
        <p class="status-question">
          ¿Estás seguro que deseas
          <strong>{{ isActive ? "desactivar" : "activar" }}</strong> a
          <span class="entity-name">{{ entityName }}</span
          >?
        </p>

        @if (warningMessage && isActive) {
          <p class="status-warning">{{ warningMessage }}</p>
        }

        <div class="modal-footer">
          <button
            class="cancel-btn"
            (click)="closeModal()"
            [disabled]="isLoading"
          >
            Cancelar
          </button>
          <button
            class="confirm-btn"
            (click)="confirm()"
            [disabled]="isLoading"
          >
            @if (isLoading) {
              <span class="spinner-sm"></span> Guardando...
            } @else {
              {{ isActive ? "Sí, desactivar" : "Sí, activar" }}
            }
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
