// src/app/shared/components/qr-scanner-modal/qr-scanner-modal.component.html
<div class="modal-overlay" (click)="closeScanner.emit()">
  <div class="modal-box scanner-modal" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2 class="modal-title">Escanear QR</h2>
      <button class="modal-close" (click)="closeScanner.emit()">✕</button>
    </div>
    
    <div class="modal-body">
      <div class="scanner-container">
        <div id="reader"></div>
        <div class="scanner-overlay">
          <div class="scan-frame"></div>
          <div class="scanning-line"></div>
        </div>
      </div>
      
      @if (errorMessage) {
        <p class="error-text">{{ errorMessage }}</p>
      } @else {
        <p class="scanner-hint">Apunta la cámara al código QR</p>
      }
    </div>
    
    <div class="modal-footer">
      <button class="btn btn-secondary" (click)="closeScanner.emit()">Cancelar</button>
    </div>
  </div>
</div>
