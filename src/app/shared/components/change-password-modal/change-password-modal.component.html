<div class="modal-overlay">
  <div class="modal-container">
    <div class="modal-header">
      <div class="header-content">
        <div class="icon-box">
          <i class="fas fa-shield-halved"></i>
        </div>
        <div>
          <h2 class="modal-title">Seguridad Primero</h2>
          <p class="modal-subtitle">
            Tu contraseña actual es temporal. Por favor, crea una nueva.
          </p>
        </div>
      </div>
    </div>

    <form (submit)="onSubmit()" class="modal-body">
      <!-- Password Actual -->
      <div class="form-group">
        <label for="oldPassword">Contraseña Temporal Actual</label>
        <div class="input-wrapper">
          <i class="fas fa-key input-icon"></i>
          <input
            [type]="showOldPassword() ? 'text' : 'password'"
            id="oldPassword"
            name="oldPassword"
            [(ngModel)]="oldPassword"
            placeholder="Introduce la contra que te dieron"
            required
          />
          <button
            type="button"
            class="btn-toggle"
            (click)="toggleOldPasswordVisibility()"
          >
            <i
              class="fas"
              [class.fa-eye]="!showOldPassword()"
              [class.fa-eye-slash]="showOldPassword()"
            ></i>
          </button>
        </div>
      </div>

      <div class="divider"></div>

      <!-- Nueva Password -->
      <div class="form-group">
        <label for="newPassword">Nueva Contraseña Segura</label>
        <div class="input-wrapper">
          <i class="fas fa-lock input-icon"></i>
          <input
            [type]="showNewPassword() ? 'text' : 'password'"
            id="newPassword"
            name="newPassword"
            [(ngModel)]="newPassword"
            placeholder="Min. 8 caracteres"
            required
          />
          <button
            type="button"
            class="btn-toggle"
            (click)="toggleNewPasswordVisibility()"
          >
            <i
              class="fas"
              [class.fa-eye]="!showNewPassword()"
              [class.fa-eye-slash]="showNewPassword()"
            ></i>
          </button>
        </div>
      </div>

      <!-- Strength Bar -->
      <div class="strength-container" *ngIf="newPassword()">
        <div class="strength-header">
          <span class="strength-label"
            >Fuerza: <strong>{{ strengthLabel() }}</strong></span
          >
          <span class="strength-percent">{{ strengthScore() }}%</span>
        </div>
        <div class="strength-track">
          <div
            class="strength-fill"
            [style.width.%]="strengthScore()"
            [ngClass]="strengthClass()"
          ></div>
        </div>
      </div>

      <!-- Requisitos -->
      <div class="requirements-grid">
        <div class="req-item" [class.valid]="hasMinLength()">
          <i
            class="fas"
            [class.fa-check-circle]="hasMinLength()"
            [class.fa-circle]="!hasMinLength()"
          ></i>
          <span>Mínimo 8 caracteres</span>
        </div>
        <div class="req-item" [class.valid]="hasUpperCase()">
          <i
            class="fas"
            [class.fa-check-circle]="hasUpperCase()"
            [class.fa-circle]="!hasUpperCase()"
          ></i>
          <span>Mayúscula</span>
        </div>
        <div class="req-item" [class.valid]="hasLowerCase()">
          <i
            class="fas"
            [class.fa-check-circle]="hasLowerCase()"
            [class.fa-circle]="!hasLowerCase()"
          ></i>
          <span>Minúscula</span>
        </div>
        <div class="req-item" [class.valid]="hasNumber()">
          <i
            class="fas"
            [class.fa-check-circle]="hasNumber()"
            [class.fa-circle]="!hasNumber()"
          ></i>
          <span>Número</span>
        </div>
        <div class="req-item" [class.valid]="hasSpecialChar()">
          <i
            class="fas"
            [class.fa-check-circle]="hasSpecialChar()"
            [class.fa-circle]="!hasSpecialChar()"
          ></i>
          <span>Carácter especial</span>
        </div>
      </div>

      <!-- Confirmar Password -->
      <div class="form-group">
        <label for="confirmPassword">Confirmar Nueva Contraseña</label>
        <div class="input-wrapper">
          <i class="fas fa-check-double input-icon"></i>
          <input
            [type]="showConfirmPassword() ? 'text' : 'password'"
            id="confirmPassword"
            name="confirmPassword"
            [(ngModel)]="confirmPassword"
            placeholder="Repite tu nueva contra"
            required
          />
          <button
            type="button"
            class="btn-toggle"
            (click)="toggleConfirmPasswordVisibility()"
          >
            <i
              class="fas"
              [class.fa-eye]="!showConfirmPassword()"
              [class.fa-eye-slash]="showConfirmPassword()"
            ></i>
          </button>
          <i class="fas fa-check match-icon" *ngIf="passwordsMatch()"></i>
        </div>
      </div>

      <div class="footer-actions">
        <button
          type="submit"
          class="btn-submit"
          [disabled]="!isValid() || loading()"
        >
          <span *ngIf="!loading()">Actualizar Contraseña</span>
          <div class="spinner" *ngIf="loading()"></div>
        </button>
      </div>
    </form>

    <div class="security-disclaimer">
      <i class="fas fa-info-circle"></i>
      <span
        >Tu seguridad es nuestra prioridad. Usa una contraseña que no uses en
        otros sitios.</span
      >
    </div>
  </div>
</div>
